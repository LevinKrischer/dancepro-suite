<header class="app-header">
  <a routerLink="/dashboard" class="brand">Dancepro</a>

  <div class="session-state">
    @if (auth.isAuthenticated()) {
      <span class="user">{{ auth.user()?.email }}</span>
      @if (auth.roleKeys().length > 0) {
        <span class="roles">{{ roleLabel() }}</span>
      }
      <button type="button" (click)="signOut()">Logout</button>
    } @else {
      <a routerLink="/login">Login</a>
    }
  </div>
</header>

<main>
  <router-outlet />
</main>
